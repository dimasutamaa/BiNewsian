<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/auth}">
<head>
    <title>Reset Password</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-header">
            <h2 class="mb-0">Reset Password</h2>
        </div>

        <div class="auth-body">
            <!-- Alert Messages -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
                <i class="bi bi-info-circle-fill"></i>
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Form -->
            <form id="resetPasswordForm" th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" id="resetSubmitBtn" class="btn btn-auth w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Reset Password
                </button>
            </form>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            $(document).ready(function() {
                $('#resetPasswordForm').on('submit', function(e) {
                    var $submitBtn = $('#resetSubmitBtn');

                    if ($submitBtn.prop('disabled')) {
                        e.preventDefault();
                        return false;
                    }

                    $submitBtn.prop('disabled', true);

                    $submitBtn.html(
                        '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>' +
                        'Resetting...'
                    )
                })
            })
        </script>
    </th:block>
</body>
</html>
