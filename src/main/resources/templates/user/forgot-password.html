<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/auth}">
<head>
    <title>Forgot Password</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-header">
            <h2 class="mb-0">Forgot Password</h2>
        </div>

        <div class="auth-body">
            <!-- Alert Messages -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${message}" class="alert alert-info alert-dismissible fade show" role="alert">
                <i class="bi bi-info-circle-fill"></i>
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Form -->
            <form id="forgotPasswordForm" th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-auth w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i> Send
                </button>

                <div class="text-center">
                    <p class="mb-0">
                        <a th:href="@{/login}" class="auth-link">Back to login</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            $(document).ready(function() {
                $('#forgotPasswordForm').on('submit', function(e) {
                    var $submitBtn = $('#submitBtn');

                    if ($submitBtn.prop('disabled')) {
                        e.preventDefault();
                        return false;
                    }

                    $submitBtn.prop('disabled', true);

                    $submitBtn.html(
                        '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>' +
                        'Sending...'
                    );

                });
            })
        </script>
    </th:block>
</body>
</html>
