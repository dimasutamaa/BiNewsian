<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/panel}">
<head>
    <title>Create Activity</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mb-4">
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/contributor/content}" class="btn btn-light" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a th:href="@{/contributor/create-news}" class="btn btn-light" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-plus-lg"></i> Create News
                </a>
                <a th:href="@{/contributor/create-activity}" class="btn btn-gradient" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-plus-lg"></i> Create Activity
                </a>
            </div>
        </div>

        <div class="container mb-4">
            <div class="row">
                <div class="col-md-12">
                    <div class="card content-card mb-4">
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label for="title" class="form-label">Activity Title<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="title">
                                    <div id="titleError" class="invalid-feedback"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="type" class="form-label">Type<span class="text-danger">*</span></label>
                                        <select class="form-select" id="type">
                                            <option selected>Select a type</option>
                                            <option value="SAT">Student Activity Point</option>
                                            <option value="ComServ">Community Service</option>
                                        </select>
                                        <div id="typeError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-3 mb-3">
                                        <label for="quota" class="form-label">Quota<span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="quota" min="1" placeholder="Enter quota for this activity">
                                        <div id="quotaError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-3 mb-3">
                                        <label for="amount" class="form-label">Point/Hour Amount<span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="amount" min="1" placeholder="Enter reward amount">
                                        <div id="amountError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-3 mb-3">
                                        <label for="link" class="form-label">Registration Link<span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="link" placeholder="Enter registration link">
                                        <div id="linkError" class="invalid-feedback"></div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-3 mb-3">
                                        <label for="location" class="form-label">Location<span class="text-danger">*</span></label>
                                        <select class="form-select" id="location">
                                            <option selected>Select location</option>
                                            <option value="Onsite">Onsite</option>
                                            <option value="Online">Online</option>
                                        </select>
                                        <div id="locationError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-3 mb-3">
                                        <label class="form-label">Time<span class="text-danger">*</span></label>
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="flex-fill">
                                                <label for="timeStart" class="visually-hidden">Start Time</label>
                                                <input type="time" class="form-control" id="timeStart" placeholder="Start">
                                            </div>
                                            <div class="flex-fill">
                                                <label for="timeEnd" class="visually-hidden">End Time</label>
                                                <input type="time" class="form-control" id="timeEnd" placeholder="End">
                                            </div>
                                        </div>
                                        <div id="timeError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-3 mb-3">
                                        <label for="date" class="form-label">Date<span class="text-danger">*</span></label>
                                        <input type="date" class="form-control" id="date">
                                        <div id="dateError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-3 mb-3">
                                        <label for="deadline" class="form-label">Registration Deadline<span class="text-danger">*</span></label>
                                        <input type="datetime-local" class="form-control" id="deadline">
                                        <div id="deadlineError" class="invalid-feedback"></div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Activity Details<span class="text-danger">*</span></label>
                                    <div id="activity-editor" style="height: 400px;"></div>
                                    <input type="hidden" id="activity-details">
                                    <div id="activityEditorError" class="invalid-feedback"></div>
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <button type="button" class="btn btn-outline-secondary">
                                        <i class="bi bi-save me-2"></i> Save as Draft
                                    </button>

                                    <button type="submit" id="btnCreateActivity" class="btn btn-purple">
                                        <i class="bi bi-check-circle me-2"></i> Publish
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            const activityEditor = new Quill("#activity-editor", quillConfig);
            const activityEditorContent = activityEditor.root.innerHTML;

            function setInvalid(id, message) {
                $(`#${id}`).addClass("is-invalid");
                $(`#${id}Error`).text(message);
            }

            function clearInvalid(id) {
                $(`#${id}`).removeClass("is-invalid");
                $(`#${id}Error`).text("");
            }

            function setInvalidGroup(ids, errorId, message) {
                ids.forEach((id) => $(`#${id}`).addClass("is-invalid"));
                $(`#${errorId}`).text(message).addClass("d-block");
            }

            function clearInvalidGroup(ids, errorId) {
                ids.forEach((id) => $(`#${id}`).removeClass("is-invalid"));
                $(`#${errorId}`).text("").removeClass("d-block");
            }

            function setInvalidEditor(message) {
                $("#activity-editor").addClass("is-invalid form-control").css("border", "1px solid #dc3545");
                $("#activityEditorError").text(message).addClass("d-block");
            }

            function clearInvalidEditor() {
                $("#activity-editor").removeClass("is-invalid form-control").css("border", "");
                $("#activityEditorError").text("").removeClass("d-block");
            }

            $("input, select").on("input change", function () {
                clearInvalid(this.id);
            });

            $("#timeStart, #timeEnd").on("change", function () {
                const start = $("#timeStart").val();
                const end = $("#timeEnd").val();

                if (start && end && start < end) {
                    clearInvalidGroup(["timeStart", "timeEnd"], "timeError");
                }
            });

            $("#deadline").on("change", function () {
                const start = $("#timeStart").val();
                const end = $("#timeEnd").val();

                if (start && end && start < end) {
                    clearInvalidGroup(["timeStart", "timeEnd"], "timeError");
                }
            });

            activityEditor.on('text-change', function() {
                if (activityEditor.getText().trim().length > 0) {
                    clearInvalidEditor();
                }
            });

            $("form").on("submit", function (e) {
                e.preventDefault();

                const data = {
                    title: $("#title").val(),
                    type: $("#type").val(),
                    quota: $("#quota").val(),
                    amount: $("#amount").val(),
                    link: $("#link").val(),
                    location: $("#location").val(),
                    timeStart: $("#timeStart").val(),
                    timeEnd: $("#timeEnd").val(),
                    date: $("#date").val(),
                    deadline: $("#deadline").val(),
                    details: activityEditor.root.innerHTML
                };

                let isValid = true;
                $(".is-invalid").removeClass("is-invalid");

                function clearInvalid(id) {
                    const input = $(id);
                    input.removeClass("is-invalid");
                }

                if (!data.title) {
                    setInvalid("title", "Title is required");
                    isValid = false;
                }

                if (!data.type || data.type === "Select a type") {
                    setInvalid("type", "Please select a valid type");
                    isValid = false;
                }

                if (!data.quota || isNaN(data.quota) || parseInt(data.quota) <= 0) {
                    setInvalid("quota", "Please enter a valid quota");
                    isValid = false;
                }

                if (!data.amount || isNaN(data.amount) || parseInt(data.amount) <= 0) {
                    setInvalid("amount", "Please enter a valid point/hour amount");
                    isValid = false;
                }

                if (!data.link || !isValidURL(data.link)) {
                    setInvalid("link", "Please enter a valid registration link");
                    isValid = false;
                }

                if (!data.location || data.location === "Select location") {
                    setInvalid("location", "Please select a valid location");
                    isValid = false;
                }

                if (!data.timeStart || !data.timeEnd || data.timeStart >= data.timeEnd) {
                    setInvalidGroup(["timeStart", "timeEnd"], "timeError", "Please select a valid time range");
                    isValid = false;
                }

                if (!data.date || data.date < new Date().toISOString().split("T")[0]) {
                    setInvalid("date", "Please select a valid date");
                    isValid = false;
                }

                if (
                    !data.deadline ||
                    new Date(data.deadline) <= new Date() ||
                    (data.date && new Date(data.deadline) > new Date(data.date + "T23:59:59"))
                ) {
                    setInvalid("deadline", "Please select a valid registration deadline");
                    isValid = false;
                }

                if (activityEditor.getText().trim().length === 0) {
                    setInvalidEditor("Activity details cannot be empty");
                    isValid = false;
                }

                if (!isValid) {
                    return;
                }

                $.ajax({
                    url: "/admin/categories/update",
                    method: "POST",
                    data: { id: id, name: name },
                    success: function () {
                        Swal.fire({
                            icon: "success",
                            title: "Updated!",
                            text: "Category updated successfully!",
                            timer: 1600,
                            showConfirmButton: false
                        }).then(() => {
                            resetCategoryForm();
                            $("#editCategoryModal").modal("hide");
                            location.reload();
                        });
                    },

                    error: function (xhr) {
                        if (xhr.status === 400) {
                            $("#editCategoryName").addClass("is-invalid");
                            $("#editCategoryError").text(xhr.responseText || "Invalid category name.");
                        } else {
                            Swal.fire({
                                icon: "error",
                                title: "Failed to update category",
                                text: xhr.responseText || "Unknown error"
                            })
                        }
                    }
                })
            })
        </script>
        <style>
            #activity-editor.is-invalid .ql-toolbar,
            #activity-editor.is-invalid .ql-editor {
                border-color: #dc3545 !important;
            }
        </style>
    </th:block>
</body>
</html>
